<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Minha Loja Virtual</title>

    <link rel="stylesheet" href="../css/style_cadastro.css">
    <script src="../js/consulta_cep.js"></script>
    
</head>
<body>
   <main id="geral">
    <header id="cabecalho">
        <div id="logo">
        Bella chic
        </div>

        <nav id="menu">
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../paginas/cadastro.html"> Cadastro </a></li>
                <li><a href="../paginas/sobre.html">Sobre</a></li>
                <li><a href="../paginas/login.html">Login</a></li>
                <li><a href="../paginas/carrinho.html"><img src="../imagens/icones/carrojr.png" alt="Carrinho"></a></li>
            </ul>
        </nav>
    </header>

    
    <section id="form">
        
        <form id="form-pessoa">
        <h3>Cadastro pessoa</h3>


            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input001" required maxlength="60" placeholder="Digite seu nome.">
            
            <label for="sobrenome">Sobrenome</label>
            <input type="text" name="sobrenome" id="sobrenome" class="input001" required maxlength="60" placeholder="Digite seu sobrenome.">

            <label for="telefone">Telefone</label>
            <input type="text" name="telefone" id="telefone" class="input002" required maxlength="20" placeholder="Digite seu telefone.">

            <label for="email">Email:</label>
            <input type="text" name="email" id="email" class="input001" required maxlength="70" placeholder="Digite seu email.">

            <label for="datanascimento">Data de Nascimento</label>
            <input type="text" name="datanascimento" id="datanascimento" class="input002" required maxlength="8" placeholder="Digite a Data de Nascimento.">

            <label for="cep">cep</label>
            <input type="text" name="cep" id="cep" class="input002" required maxlength="8" placeholder="Digite o CEP.">

            <label for="logradouro">Logradouro</label>
            <input type="text" name="logradouro" id="logradouro" class="input001" required maxlength="200" placeholder="Digite o logradouro.">

            <label for="numero">Número</label>
            <input type="text" name="numero" id="numero" class="input002" required maxlength="7" placeholder="Digite o número.">

            <label for="complemento">Complemento</label>
            <input type="text" name="complemento" id="complemento" class="input001" required maxlength="100" placeholder="Digite o complemento.">

            <label for="bairro">Bairro</label>
            <input type="text" name="bairro" id="bairro" class="input001" required maxlength="30" placeholder="Digite o bairro.">

            <label for="cidade">Cidade</label>
            <input type="text" name="cidade" id="cidade" class="input001" required maxlength="30" placeholder="Digite a cidade.">

            <label for="estado">Estado</label>
            <input type="text" name="estado" id="estado" class="input001" required maxlength="30" placeholder="Digite o estado.">

            <label for="senha">Senha</label>
            <input type="text" name="senha" id="senha" class="input002" required maxlength="30" placeholder="Digite a senha.">

            <div class="check">
                <input type="checkbox" name="notificacao" id="notificacao"> 
                <label for="notificacao">
                    Deseja receber nossas ofertas pelo email e pelo Whatsapp?
                </label>
               </div>
    
               <div class="botoes">
                <button type="submit" id="btn-add">Cadastrar</button>
                <button type="reset" id="btn-limpar">Limpar</button>
    
               </div>
               

        </form>

    </section>

    
   </main>
   <footer id="rodape">
    <h2>&copy 2026 Bella chic</h2>
    <p>Formas de pagamentos: Pix, Cartões de Débito e Crédito</p>
</footer>

</body>
</html>
