<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>

    <link rel="stylesheet" href="../css/syte_login.css">
</head>
<body>

    <main id="geral">

        <header id="cabecalho">

    
            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/tarro02jr.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section id="login">

            <div id="caixa-login">

                <h1>Entrar</h1>

                <form action="#" method="post">

                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required>

                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        required>

                    <button type="submit">
                        Entrar
                    </button>

                </form>

                <p>
                    Ainda não possui uma conta?
                    <a href="cadastro.html">Cadastre-se</a>
                </p>

            </div>

        </section>

        <footer id="rodape">
            <h2>&copy 2026 Bella chic</h2>
            <p>Formas de pagamentos: Pix, Cartões de Débito e Crédito</p>
        </footer>  
    </main>

</body>
</html>
